AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Serverless Java Full-Stack Blog Platform

Globals:
  Function:
    Timeout: 30
    MemorySize: 1024
    Runtime: java17
    Architectures:
      - x86_64
    Environment:
      Variables:
        JAVA_TOOL_OPTIONS: -XX:+TieredCompilation -XX:TieredStopAtLevel=1
        BLOG_TABLE_NAME: !Ref BlogTable
        S3_BUCKET_NAME: !Ref BlogImageBucket

Resources:

  # ---------------------------------------------------------
  # DynamoDB Table
  # ---------------------------------------------------------
  BlogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: category
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: CategoryIndex
          KeySchema:
            - AttributeName: category
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ---------------------------------------------------------
  # S3 Bucket for Images
  # ---------------------------------------------------------
  BlogImageBucket:
    Type: AWS::S3::Bucket
    Properties:
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - POST
              - DELETE
              - HEAD
            AllowedOrigins:
              - '*' # Restrict this in production
            MaxAge: 3000

  # ---------------------------------------------------------
  # Cognito User Pool
  # ---------------------------------------------------------
  BlogUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: BlogPlatformUsers
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true

  BlogUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref BlogUserPool
      ClientName: BlogPlatformClient
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH

  # ---------------------------------------------------------
  # AppSync API
  # ---------------------------------------------------------
  BlogAppSyncApi:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: BlogPlatformAPI
      AuthenticationType: AMAZON_COGNITO_USER_POOLS
      UserPoolConfig:
        UserPoolId: !Ref BlogUserPool
        AwsRegion: !Ref AWS::Region
        DefaultAction: ALLOW

  BlogAppSyncSchema:
    Type: AWS::AppSync::GraphQLSchema
    Properties:
      ApiId: !GetAtt BlogAppSyncApi.ApiId
      Definition: |
        type Blog {
          id: ID!
          title: String!
          content: String!
          authorId: String!
          category: String!
          status: String!
          imageUrl: String
          summary_ai: String
          createdAt: String!
        }
        type Query {
          getBlog(id: ID!): Blog
          listBlogs: [Blog]
          listBlogsByCategory(category: String!): [Blog]
        }
        type Mutation {
          createBlog(title: String!, content: String!, category: String!): Blog
          updateBlog(id: ID!, title: String, content: String, category: String, status: String): Blog
          deleteBlog(id: ID!): Boolean
          getUploadUrl(filename: String!, contentType: String!): String
        }

  # ---------------------------------------------------------
  # IAM Role for Lambda
  # ---------------------------------------------------------
  BlogFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BlogPlatformLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource: 
                  - !GetAtt BlogTable.Arn
                  - !Sub "${BlogTable.Arn}/index/*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "${BlogImageBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: "*" # Should be restricted to specific models

  # ---------------------------------------------------------
  # Lambda Function (Spring Cloud Function)
  # ---------------------------------------------------------
  BlogBackendFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker::handleRequest
      Role: !GetAtt BlogFunctionRole.Arn
      Environment:
        Variables:
          MAIN_CLASS: com.blog.backend.ServerlessBackendApplication
          SPRING_CLOUD_FUNCTION_DEFINITION: handleRequest
          BEDROCK_REGION: us-east-1
      SnapStart:
        ApplyOn: PublishedVersions

  BlogLambdaDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt BlogAppSyncApi.ApiId
      Name: BlogLambdaDataSource
      Type: AWS_LAMBDA
      ServiceRoleArn: !GetAtt AppSyncServiceRole.Arn
      LambdaConfig:
        LambdaFunctionArn: !GetAtt BlogBackendFunction.Arn

  AppSyncServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: appsync.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AppSyncInvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt BlogBackendFunction.Arn

  # AppSync Resolvers mapping GraphQL Operations to Lambda
  CreateBlogResolver:
    Type: AWS::AppSync::Resolver
    Properties:
      ApiId: !GetAtt BlogAppSyncApi.ApiId
      TypeName: Mutation
      FieldName: createBlog
      DataSourceName: !GetAtt BlogLambdaDataSource.Name

  ListBlogsResolver:
    Type: AWS::AppSync::Resolver
    Properties:
      ApiId: !GetAtt BlogAppSyncApi.ApiId
      TypeName: Query
      FieldName: listBlogs
      DataSourceName: !GetAtt BlogLambdaDataSource.Name

  GetBlogResolver:
    Type: AWS::AppSync::Resolver
    Properties:
      ApiId: !GetAtt BlogAppSyncApi.ApiId
      TypeName: Query
      FieldName: getBlog
      DataSourceName: !GetAtt BlogLambdaDataSource.Name

  ListBlogsByCategoryResolver:
    Type: AWS::AppSync::Resolver
    Properties:
      ApiId: !GetAtt BlogAppSyncApi.ApiId
      TypeName: Query
      FieldName: listBlogsByCategory
      DataSourceName: !GetAtt BlogLambdaDataSource.Name

  UpdateBlogResolver:
    Type: AWS::AppSync::Resolver
    Properties:
      ApiId: !GetAtt BlogAppSyncApi.ApiId
      TypeName: Mutation
      FieldName: updateBlog
      DataSourceName: !GetAtt BlogLambdaDataSource.Name

  DeleteBlogResolver:
    Type: AWS::AppSync::Resolver
    Properties:
      ApiId: !GetAtt BlogAppSyncApi.ApiId
      TypeName: Mutation
      FieldName: deleteBlog
      DataSourceName: !GetAtt BlogLambdaDataSource.Name

  GetUploadUrlResolver:
    Type: AWS::AppSync::Resolver
    Properties:
      ApiId: !GetAtt BlogAppSyncApi.ApiId
      TypeName: Mutation
      FieldName: getUploadUrl
      DataSourceName: !GetAtt BlogLambdaDataSource.Name

Outputs:
  AppSyncApiUrl:
    Description: "GraphQL API URL"
    Value: !GetAtt BlogAppSyncApi.GraphQLUrl
  UserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref BlogUserPool
  UserPoolClientId:
    Description: "Cognito User Pool Client ID"
    Value: !Ref BlogUserPoolClient
  S3BucketName:
    Description: "S3 Bucket Name for Images"
    Value: !Ref BlogImageBucket
