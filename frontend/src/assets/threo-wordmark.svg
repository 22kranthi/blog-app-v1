<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 48" width="180" height="48">
  <!-- Threo wordmark — icon + name -->

  <!-- icon rounded square -->
  <rect x="0" y="0" width="48" height="48" rx="10.5" fill="#534AB7"/>
  <!-- T crossbar -->
  <line x1="13" y1="17" x2="35" y2="17" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- T stem -->
  <line x1="24" y1="17" x2="24" y2="33" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- 4-point spark -->
  <path d="M27.5 26 L28.8 29.5 L32.5 30.8 L28.8 32.1 L27.5 35.5 L26.2 32.1 L22.5 30.8 L26.2 29.5 Z" fill="white" opacity="0.85"/>
  <!-- subtle dots -->
  <circle cx="33" cy="22" r="1.4" fill="white" opacity="0.4"/>
  <circle cx="36" cy="18" r="1" fill="white" opacity="0.25"/>

  <!-- wordmark text -->
  <text
    x="62"
    y="33"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="500"
    letter-spacing="0.3"
    fill="#534AB7"
  >Threo</text>
</svg>
