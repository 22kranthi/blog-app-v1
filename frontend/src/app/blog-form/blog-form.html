<div class="create-wrapper">
  
  <div class="create-container" *ngIf="isBrowser">
    
    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-label">{{ editId ? 'Edit post' : 'New post' }}</div>
      <div class="steps">
        <div class="step active">
          <div class="step-circle">1</div>
          <div class="step-label">Details</div>
        </div>
        <div class="step-divider"></div>
        <div class="step" [class.active]="title.length > 0">
          <div class="step-circle">2</div>
          <div class="step-label">Content</div>
        </div>
        <div class="step-divider"></div>
        <div class="step" [class.active]="content.length > 0">
          <div class="step-circle">3</div>
          <div class="step-label">Preview</div>
        </div>
      </div>
    </div>

    <!-- Title Section -->
    <div class="title-row">
      <span class="hint-label">Title</span>
      <input type="text" class="title-input" placeholder="Your post title…" [(ngModel)]="title" (ngModelChange)="onFieldChange()">
    </div>

    <!-- Editor Body -->
    <div class="editor-body">
      
      <!-- Content Area -->
      <div class="content-area">
        <span class="hint-label">Content</span>
        <textarea class="content-textarea" 
                  placeholder="Start writing your post here. Your thoughts deserve space…" 
                  [(ngModel)]="content" 
                  (ngModelChange)="onFieldChange()"></textarea>
      </div>

      <!-- Sidebar -->
      <div class="sidebar">
        
        <!-- Categories -->
        <div class="sidebar-group">
          <span class="sidebar-group-label">Category</span>
          <div class="cat-chips">
            @for (cat of categoriesArray; track cat; let i = $index) {
              <div class="cat-chip selected">
                {{ cat }}
                <span class="remove-x" (click)="removeCategory(i)">×</span>
              </div>
            }
            
            @if (showCategoryInput) {
              <input type="text" class="cat-input-inline" 
                     [(ngModel)]="newCategory" 
                     (keyup.enter)="addCategory()" 
                     (blur)="addCategory()" 
                     placeholder="Type..." autofocus>
            } @else {
              <div class="cat-chip add" (click)="showCategoryInput = true">+ Add</div>
            }
          </div>
        </div>

        <!-- Cover Image -->
        <div class="sidebar-group">
          <span class="sidebar-group-label">Cover image</span>
          <div class="upload-zone" 
               [class.drag-over]="isDragging"
               (dragover)="onDragOver($event)"
               (dragleave)="onDragLeave($event)"
               (drop)="onDrop($event)"
               (click)="fileInput.click()">
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <div class="upload-text"><span>Browse</span> or drag & drop</div>
            <div class="upload-sub">JPG, PNG, WebP · max 5MB</div>
          </div>
          <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" style="display: none;" [disabled]="isSubmitting">
          
          <!-- Image Preview -->
          <div *ngIf="imagePreview" class="image-preview-sidebar">
            <img [src]="imagePreview" alt="Preview">
            <button class="btn-remove-preview" (click)="removeImage(); $event.stopPropagation()">×</button>
          </div>
        </div>

      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="footer-status">{{ draftStatus }}</div>
      <div class="footer-actions">
        <button class="btn-cancel" routerLink="/">Cancel</button>
        <button class="btn-publish" (click)="save()" [disabled]="isSubmitting">
          {{ editId ? 'Update Post →' : 'Publish →' }}
        </button>
      </div>
    </div>

  </div>
</div>
