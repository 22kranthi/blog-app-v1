<nav class="navbar">
  <div class="nav-brand">
    <a routerLink="/" class="logo"><img src="../assets/threo-wordmark.svg" alt="BlogApp Logo"></a>
  </div>
  <div class="nav-links">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">Home</a>
    @if (authService.isAuthenticated()) {
      <a routerLink="/my-blogs" routerLinkActive="active" class="nav-link">My Blogs</a>
    }
    <a routerLink="/add" routerLinkActive="active" class="nav-link">Add Blog</a>
    @if (authService.isAdmin()) {
      <a routerLink="/admin" routerLinkActive="active" class="nav-link" style="color: #8a2be2;">Dashboard</a>
    }
    
    <div class="admin-toggle-wrapper" style="display: flex; align-items: center; margin-left: 1rem; color: var(--text-secondary); font-weight: 500; gap: 10px;">
      @if (authService.isAdmin()) {
        <span style="font-size: 0.8rem; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px;">ADMIN</span>
      }
      @if (!authService.isAuthenticated()) {
        <button (click)="authService.login()" style="cursor: pointer; background: transparent; border: 1px solid var(--text-secondary); color: var(--text-primary); padding: 4px 10px; border-radius: 4px;">Login</button>
      } @else {
        <button (click)="authService.logout()" style="cursor: pointer; background: transparent; border: 1px solid var(--text-secondary); color: var(--text-primary); padding: 4px 10px; border-radius: 4px;">Logout</button>
      }
    </div>
  </div>
</nav>

<main class="main-content">
  <router-outlet></router-outlet>
</main>

<div class="modal-overlay" [class.modal-visible]="authService.showLoginModal()" (click)="authService.closeLogin()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="authService.closeLogin()">×</button>
    <amplify-authenticator [formFields]="formFields"></amplify-authenticator>
  </div>
</div>

<app-notification></app-notification>
