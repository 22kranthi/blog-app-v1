<nav class="navbar">
  <div class="nav-brand">
    <a routerLink="/"><img src="../assets/threo-wordmark.svg" alt="BlogApp" height="20"></a>
  </div>
  <div class="nav-links">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">Home</a>
    @if (authService.isAuthenticated()) {
      <a routerLink="/my-blogs" routerLinkActive="active" class="nav-link">My posts</a>
    }
    <a routerLink="/add" routerLinkActive="active" class="nav-link">New post</a>
    @if (authService.isAdmin()) {
      <a routerLink="/admin" routerLinkActive="active" class="nav-link" style="color: var(--purple-dark);">Dashboard</a>
    }
    
    <div class="admin-toggle-wrapper" style="display: flex; align-items: center; margin-left: 0.5rem; position: relative; gap: 12px;">
      @if (authService.isAdmin()) {
        <span class="admin-badge">ADMIN</span>
      }
      @if (!authService.isAuthenticated()) {
        <button class="btn-login" (click)="authService.login()">Login</button>
      } @else {
        <button class="nav-avatar" (click)="toggleDropdown()" title="Account">
          {{ initials }}
        </button>

        @if (isDropdownOpen()) {
          <div class="avatar-dropdown">
            <div class="dropdown-header">
              <span class="dropdown-name">{{ authService.userDisplayName() || 'User' }}</span>
            </div>
            <button class="dropdown-item" (click)="logout()">Log out</button>
          </div>
        }
      }
    </div>
  </div>
</nav>

<main class="main-content">
  <router-outlet></router-outlet>
</main>

<div class="modal-overlay" [class.modal-visible]="authService.showLoginModal()" (click)="authService.closeLogin()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="authService.closeLogin()">×</button>
    <amplify-authenticator [formFields]="formFields"></amplify-authenticator>
  </div>
</div>

<app-notification></app-notification>
